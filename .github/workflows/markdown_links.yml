# Workflow name:
name: markdown_links

# Workflow triggers:
on:
  schedule:
    # Run the workflow once a month on the 1st day of every month:
    - cron: '0 0 1 * *'

  # Allow the workflow to be manually run:
  workflow_dispatch:

# Global permissions:
permissions:
  # Allow read-only access to the repository contents:
  contents: read

# Workflow jobs:
jobs:

  # Define a job for detecting broken links in Markdown files...
  markdown_links:

    # Define a display name:
    name: 'Check links'

    # Ensure the job does not run on forks:
    if: github.repository == 'stdlib-js/stdlib'

    # Define the type of virtual host machine:
    runs-on: ubuntu-latest

    # Define environment variables:
    env:
      LOG_DIR: "${{ github.workspace }}/tmp/var/log"
      LOG_FILE_FAILURES: "${{ github.workspace }}/tmp/var/log/failures.json"
      LOG_FILE_WARNINGS: "${{ github.workspace }}/tmp/var/log/warnings.json"

    # Set defaults:
    defaults:
      run:
        # Set the default shell to `bash`:
        shell: bash --noprofile --norc -eo pipefail {0}

    # Define the sequence of job steps...
    steps:

      # Checkout the repository:
      - name: 'Checkout repository'
        # Pin action to full length commit SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Specify whether to remove untracked files before checking out the repository:
          clean: true

          # Limit clone depth to the most recent commit:
          fetch-depth: 1

          # Specify whether to download Git-LFS files:
          lfs: false

          # Avoid storing GitHub token in local Git configuration:
          persist-credentials: false
        timeout-minutes: 10

      # Initialize log files:
      - name: 'Initialize log files'
        run: |
          mkdir -p "${{ env.LOG_DIR }}"
          touch "${{ env.LOG_FILE_FAILURES }}"
          touch "${{ env.LOG_FILE_WARNINGS }}"
        timeout-minutes: 2

      # Check for broken links:
      - name: 'Check links'
        uses: stdlib-js/check-markdown-link-definitions-action@main
        id: results
        with:
          exclude: https://github.com/stdlib-js/stdlib/tree/develop/lib/node_modules
        timeout-minutes: 240

      # Install Node.js:
      - name: 'Install Node.js'
        # Pin action to full length commit SHA
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20' # 'lts/*'
        timeout-minutes: 5

      # Install dependencies (accounting for possible network failures, etc, when installing node module dependencies):
      - name: 'Install dependencies'
        run: |
          make install-node-modules || make install-node-modules || make install-node-modules
        timeout-minutes: 15

      # Initialize development environment:
      - name: 'Initialize development environment'
        run: |
          make init
        timeout-minutes: 5

      # Check whether links are included in `docs/links/database.json` and use the correct identifier:
      - name: 'Check links against database'
        run: |
          # Determine root directory:
          root=$(git rev-parse --show-toplevel)

          # Define the path to a utility for validating links:
          validate="${root}/lib/node_modules/@stdlib/_tools/links/validate/bin/cli"

          echo "## Link Validation" >> $GITHUB_STEP_SUMMARY

          output=$(echo '${{ steps.results.outputs.all_links }}' | ${validate})
          if [[ "${output}" != "All links are valid." ]]; then
            echo "| URL | ID | Error |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | -- | ----- |" >> $GITHUB_STEP_SUMMARY

            echo "$output" | jq -r '.[] | [.error, .id, .url] | @tsv' | while IFS=$'\t' read -r error id url; do
              echo "| $url | \`$id\` | $error |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "$output"
          fi

      # Log the results:
      - name: 'Log results'
        run: |
          echo ${{ steps.results.outputs.failures }} >> "${{ env.LOG_FILE_FAILURES }}"
          echo ${{ steps.results.outputs.warnings }} >> "${{ env.LOG_FILE_WARNINGS }}"
        timeout-minutes: 2

      # Fail the workflow if the status is not "success":
      - name: 'Check status'
        id: check-status
        if: ${{ steps.results.outputs.status != 'success' }}
        run: |
          exit 1

      # View the log file if the previous step fails:
      - name: 'View log file'
        if: failure()
        run: |
          echo "Printing the list of failures..."
          cat "${{ env.LOG_FILE_FAILURES }}"
        timeout-minutes: 5

      # Create sub-issues for individual broken links:
      - name: 'Create sub-issues for broken links'
        if: failure() && contains(steps.check-status.outcome, 'failure')
        env:
          GITHUB_TOKEN: ${{ secrets.STDLIB_BOT_PAT_REPO_WRITE }}
        run: |
          "$GITHUB_WORKSPACE/.github/workflows/scripts/markdown_links/create_broken_link_issues" \
            '${{ steps.results.outputs.failures }}' \
            "9112"
        timeout-minutes: 30

      # Upload the log files:
      - name: 'Upload log files'
        # Pin action to full length commit SHA
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          # Define a name for the uploaded artifact:
          name: results

          # Specify the paths to upload:
          path: |
            ${{ env.LOG_FILE_FAILURES }}
            ${{ env.LOG_FILE_WARNINGS }}

          # Specify the number of days to retain the artifact (default is 90 days):
          retention-days: 10
        timeout-minutes: 10

  # Define a job for sending notifications to Zulip...
  zulip:

    # Define a display name:
    name: 'Zulip notification'

    # Define the type of virtual host machine:
    runs-on: 'ubuntu-latest'

    # Indicate that this job depends on the prior job finishing:
    needs: markdown_links

    # Run this job regardless of the outcome of the prior job:
    if: always()

    # Set defaults:
    defaults:
      run:
        # Set the default shell to `bash`:
        shell: bash --noprofile --norc -eo pipefail {0}

    # Define the sequence of job steps...
    steps:

      # Resolve notification data:
      - name: 'Resolve notification data'
        run: |
          if [[ "${{ needs.markdown_links.result }}" = "success" ]]; then
            echo 'NOTIFICATION_ICON=:check:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=succeeded' >> $GITHUB_ENV
          elif [[ "${{ needs.markdown_links.result }}" = "failure" ]]; then
            echo 'NOTIFICATION_ICON=:cross_mark:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=failed' >> $GITHUB_ENV
          elif [[ "${{ needs.markdown_links.result }}" = "cancelled" ]]; then
            echo 'NOTIFICATION_ICON=:warning:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=was canceled' >> $GITHUB_ENV
          else
            exit 1
          fi
        timeout-minutes: 5

      # Send notification to Zulip:
      - name: 'Send notification'
        # Pin action to full length commit SHA
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa # v2.0.1
        if: success()
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: 'github-actions-bot@stdlib.zulipchat.com'
          organization-url: 'https://stdlib.zulipchat.com'
          to: 'workflows'
          type: 'stream'
          topic: 'markdown-links'
          content: |
            ${{ env.NOTIFICATION_ICON }} **markdown_links** workflow ${{ env.NOTIFICATION_STATUS }}

            **Run:** [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        timeout-minutes: 5
