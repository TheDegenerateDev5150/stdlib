# Workflow name:
name: markdown_src_attributes

# Workflow triggers:
on:
  schedule:
    # Run the workflow once a month on the 1st day of every month:
    - cron: '0 0 1 * *'

  # Allow the workflow to be manually run:
  workflow_dispatch:

# Global permissions:
permissions:
  # Allow read-only access to the repository contents:
  contents: read

# Workflow jobs:
jobs:

  # Define a job for detecting broken `src` in Markdown files...
  markdown_src_attributes:

    # Define a display name:
    name: 'Check `src` attribute URLs'

    # Define the type of virtual host machine:
    runs-on: ubuntu-latest

    # Define environment variables:
    env:
      LOG_DIR: "${{ github.workspace }}/tmp/var/log"
      LOG_FILE_FAILURES: "${{ github.workspace }}/tmp/var/log/failures.json"
      LOG_FILE_WARNINGS: "${{ github.workspace }}/tmp/var/log/warnings.json"

    # Set defaults:
    defaults:
      run:
        # Set the default shell to `bash`:
        shell: bash --noprofile --norc -eo pipefail {0}

    # Define the sequence of job steps...
    steps:

      # Checkout the repository:
      - name: 'Checkout repository'
        # Pin action to full length commit SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Specify whether to remove untracked files before checking out the repository:
          clean: true

          # Limit clone depth to the most recent commit:
          fetch-depth: 1

          # Specify whether to download Git-LFS files:
          lfs: false

          # Avoid storing GitHub token in local Git configuration:
          persist-credentials: false
        timeout-minutes: 10

      # Initialize log files:
      - name: 'Initialize log files'
        run: |
          mkdir -p "${{ env.LOG_DIR }}"
          touch "${{ env.LOG_FILE_FAILURES }}"
          touch "${{ env.LOG_FILE_WARNINGS }}"
        timeout-minutes: 2

      # Check for broken `src` attribute URLs:
      - name: 'Check `src` attribute URLs'
        # Pin action to full length commit SHA
        uses: stdlib-js/check-markdown-src-action@9d9c0883b8c06a04576a146e480ef7937c51cdbf # v2.0.1
        id: results
        with:
          exclude: /path/to/
        timeout-minutes: 120

      # Log the results:
      - name: 'Log results'
        run: |
          echo ${{ steps.results.outputs.failures }} >> "${{ env.LOG_FILE_FAILURES }}"
          echo ${{ steps.results.outputs.warnings }} >> "${{ env.LOG_FILE_WARNINGS }}"
        timeout-minutes: 2

      # Fail the workflow if the status is not "success":
      - name: 'Check status'
        if: ${{ steps.results.outputs.status }} != 'success'
        run: |
          exit 1

      # View the log file if the previous step fails:
      - name: 'View log file'
        if: failure()
        run: |
          echo "Printing the list of failures..."
          cat "${{ env.LOG_FILE_FAILURES }}"
        timeout-minutes: 5

      # Upload the log files:
      - name: 'Upload log files'
        # Pin action to full length commit SHA
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        if: always()
        with:
          # Define a name for the uploaded artifact:
          name: results

          # Specify the paths to upload:
          path: |
            ${{ env.LOG_FILE_FAILURES }}
            ${{ env.LOG_FILE_WARNINGS }}

          # Specify the number of days to retain the artifact (default is 90 days):
          retention-days: 10
        timeout-minutes: 10

  # Define a job for sending notifications to Zulip...
  zulip:

    # Define a display name:
    name: 'Zulip notification'

    # Define the type of virtual host machine:
    runs-on: 'ubuntu-latest'

    # Indicate that this job depends on the prior job finishing:
    needs: markdown_src_attributes

    # Run this job regardless of the outcome of the prior job:
    if: always()

    # Set defaults:
    defaults:
      run:
        # Set the default shell to `bash`:
        shell: bash --noprofile --norc -eo pipefail {0}

    # Define the sequence of job steps...
    steps:

      # Resolve notification data:
      - name: 'Resolve notification data'
        run: |
          if [[ "${{ needs.markdown_src_attributes.result }}" = "success" ]]; then
            echo 'NOTIFICATION_ICON=:check:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=succeeded' >> $GITHUB_ENV
          elif [[ "${{ needs.markdown_src_attributes.result }}" = "failure" ]]; then
            echo 'NOTIFICATION_ICON=:cross_mark:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=failed' >> $GITHUB_ENV
          elif [[ "${{ needs.markdown_src_attributes.result }}" = "cancelled" ]]; then
            echo 'NOTIFICATION_ICON=:warning:' >> $GITHUB_ENV
            echo 'NOTIFICATION_STATUS=was canceled' >> $GITHUB_ENV
          else
            exit 1
          fi
        timeout-minutes: 5

      # Send notification to Zulip:
      - name: 'Send notification'
        # Pin action to full length commit SHA
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
        if: success()
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: 'github-actions-bot@stdlib.zulipchat.com'
          organization-url: 'https://stdlib.zulipchat.com'
          to: 'workflows'
          type: 'stream'
          topic: 'markdown-src-attributes'
          content: |
            ${{ env.NOTIFICATION_ICON }} **markdown_src_attributes** workflow ${{ env.NOTIFICATION_STATUS }}

            **Run:** [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        timeout-minutes: 5
